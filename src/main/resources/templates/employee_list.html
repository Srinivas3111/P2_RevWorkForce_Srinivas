<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee List | Revature</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-main);
        }

        th {
            text-align: left;
            padding: 16px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
            font-weight: 700;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: rgba(31, 60, 136, 0.02);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-active {
            background: #f0fff4;
            color: #27ae60;
        }

        .status-inactive {
            background: #fff5f5;
            color: #c0392b;
        }

        .alert {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .alert-success {
            background: #f0fff4;
            color: #27ae60;
            border: 1px solid #00ff0024;
        }

        .alert-error {
            background: #fff5f5;
            color: #c0392b;
            border: 1px solid #ff000024;
        }
    </style>
</head>

<body>
    <div class="dashboard-wrapper">
        <!-- Dashboard Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a th:href="@{/admin/dashboard}" class="sidebar-logo">REVATURE</a>
            </div>

            <ul class="sidebar-menu">
                <li class="menu-item">
                    <a th:href="@{/admin/dashboard}" class="menu-link">
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a th:href="@{/admin/employees}" class="menu-link active">
                        <span>Manage Employees</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a th:href="@{/admin/add-employee}" class="menu-link">
                        <span>Add Employee</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="#" class="menu-link">
                        <span>Audit Logs</span>
                    </a>
                </li>
            </ul>

            <div class="sidebar-footer">
                <a th:href="@{/logout}" class="btn btn-logout" style="width: 100%; text-align: center;">Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="user-info">
                    <span>Admin</span>
                    <div class="avatar">A</div>
                </div>
            </header>

            <div class="page-header" style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <h1 class="page-title">Employee Directory</h1>
                    <p class="page-subtitle">A comprehensive list of all members in the organization.</p>
                </div>
                <a th:href="@{/admin/add-employee}" class="btn btn-primary">+ Register Employee</a>
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Emp ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Department</th>
                                <th>Designation</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="emp : ${employees}">
                                <td th:text="${emp.id}" style="font-weight: 600; color: var(--primary);">1</td>
                                <td th:text="${emp.firstName + ' ' + emp.lastName}">John Doe</td>
                                <td th:text="${emp.email}">john@doe.com</td>
                                <td>
                                    <span th:text="${emp.role}" class="status-badge"
                                        style="background: #e0e6ed; color: var(--text-muted);">ROLE</span>
                                </td>
                                <td th:text="${emp.department ?: 'N/A'}">N/A</td>
                                <td th:text="${emp.designation ?: 'N/A'}">N/A</td>
                                <td>
                                    <span
                                        th:class="${emp.active ? 'status-badge status-active' : 'status-badge status-inactive'}"
                                        th:text="${emp.active ? 'Active' : 'Inactive'}">Active</span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/edit-employee/{id}(id=${emp.id})}" class="btn btn-primary"
                                        style="padding: 5px 12px; font-size: 11px;">Edit</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
