<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holiday Calendar | Revature</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .layout-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: end;
            margin-bottom: 12px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full {
            grid-column: span 2;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group textarea {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text-main);
        }

        .form-group textarea {
            min-height: 72px;
            resize: vertical;
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 11px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #f8fafc;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            font-size: 11px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .alert {
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .alert-success {
            background: #f0fff4;
            color: #15803d;
            border: 1px solid #bbf7d0;
        }

        .alert-error {
            background: #fff5f5;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .holiday-row .edit-field,
        .holiday-row .edit-actions {
            display: none;
        }

        .holiday-row .view-field {
            display: inline-flex;
            min-height: 36px;
            align-items: center;
            width: 100%;
            color: var(--text-main);
        }

        .holiday-row.editing {
            background: #f8fbff;
        }

        .holiday-row.editing .view-field,
        .holiday-row.editing .view-actions {
            display: none;
        }

        .holiday-row.editing .edit-field {
            display: block;
        }

        .holiday-row.editing .edit-actions {
            display: flex;
        }

        .holiday-row .edit-field {
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 13px;
            color: var(--text-main);
            background: #ffffff;
            transition: border-color .15s ease, box-shadow .15s ease;
        }

        .holiday-row .edit-field:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(58, 108, 244, 0.14);
        }

        .holiday-row input[type="text"],
        .holiday-row input[type="date"] {
            width: 100%;
        }

        .holiday-row td:nth-child(3) .edit-field {
            min-width: 220px;
        }

        .btn-danger {
            background: #dc2626;
            color: #fff;
            border: 1px solid #dc2626;
        }

        .btn-danger:hover {
            background: #b91c1c;
            border-color: #b91c1c;
        }

        @media (max-width: 900px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar" th:replace="~{fragments/admin_sidebar :: adminSidebar('holiday-calendar')}"></aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="user-info">
                    <a class="notif-bell-wrap" th:href="@{/notifications}" title="Notifications">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                        </svg>
                        <span class="notif-badge" th:attr="data-count=${unreadCount}" th:text="${unreadCount > 0 ? unreadCount : ''}" th:if="${unreadCount != null and unreadCount > 0}"></span>
                    </a>
                    <span th:text="${user != null ? user.name : 'Admin'}">Admin</span>
                    <div class="avatar" th:text="${user != null ? user.name.substring(0,1) : 'A'}">A</div>
                </div>
            </header>

            <div class="page-header">
                <h1 class="page-title">Company Holiday Calendar</h1>
                <p class="page-subtitle">Define and manage official company holidays by year.</p>
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <div class="layout-grid">
                <div class="card">
                    <form class="filters" th:action="@{/admin/holiday-calendar}" method="get">
                        <div class="form-group">
                            <label for="filterYear">Year</label>
                            <input id="filterYear" type="number" name="year" min="2000" max="2100"
                                th:value="${selectedYear}" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Load Calendar</button>
                    </form>

                    <h2 class="sub-title">Add New Holiday</h2>
                    <form th:action="@{/admin/holidays}" method="post">
                        <input type="hidden" name="year" th:value="${selectedYear}">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Holiday Name</label>
                                <input type="text" name="name" placeholder="Festival Day" required>
                            </div>
                            <div class="form-group">
                                <label>Holiday Date</label>
                                <input type="date" name="holidayDate" required>
                            </div>
                            <div class="form-group full">
                                <label>Description (Optional)</label>
                                <textarea name="description" placeholder="Description or notes"></textarea>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Holiday</button>
                    </form>
                </div>

                <div class="card">
                    <h2 class="sub-title">Holiday List (<span th:text="${selectedYear}">2026</span>)</h2>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Holiday Name</th>
                                    <th>Description</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(holidays)}">
                                    <td colspan="4">No holidays defined for this year.</td>
                                </tr>
                                <tr class="holiday-row" th:each="holidayItem : ${holidays}"
                                    th:id="${'holiday-row-' + holidayItem.id}">
                                    <td>
                                        <span class="view-field" th:text="${holidayItem.holidayDate}">2026-01-26</span>
                                        <input class="edit-field" type="date" name="holidayDate"
                                            th:value="${holidayItem.holidayDate}"
                                            th:attr="form=${'updateHolidayForm-' + holidayItem.id}" required>
                                    </td>
                                    <td>
                                        <span class="view-field" th:text="${holidayItem.name}">Republic Day</span>
                                        <input class="edit-field" type="text" name="name" th:value="${holidayItem.name}"
                                            th:attr="form=${'updateHolidayForm-' + holidayItem.id}" required>
                                    </td>
                                    <td>
                                        <span class="view-field"
                                            th:text="${holidayItem.description != null && !holidayItem.description.isEmpty() ? holidayItem.description : 'N/A'}">National
                                            holiday</span>
                                        <input class="edit-field" type="text" name="description"
                                            th:value="${holidayItem.description != null ? holidayItem.description : ''}"
                                            th:attr="form=${'updateHolidayForm-' + holidayItem.id}">
                                    </td>
                                    <td>
                                        <div class="actions view-actions">
                                            <button type="button" class="btn btn-primary btn-edit-row"
                                                th:attr="data-row-id=${holidayItem.id}">Edit</button>
                                            <form th:action="@{/admin/holidays/{id}/delete(id=${holidayItem.id})}"
                                                method="post">
                                                <input type="hidden" name="year" th:value="${selectedYear}">
                                                <button type="submit" class="btn btn-danger"
                                                    onclick="return confirm('Delete this holiday?')">Delete</button>
                                            </form>
                                        </div>
                                        <div class="actions edit-actions">
                                            <form th:id="${'updateHolidayForm-' + holidayItem.id}"
                                                th:action="@{/admin/holidays/{id}/update(id=${holidayItem.id})}"
                                                method="post">
                                                <input type="hidden" name="year" th:value="${selectedYear}">
                                                <button type="submit" class="btn btn-primary">Save</button>
                                            </form>
                                            <button type="button" class="btn btn-danger btn-cancel-row"
                                                th:attr="data-row-id=${holidayItem.id}">Cancel</button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        (function () {
            function resetRowInputs(row) {
                row.querySelectorAll(".edit-field").forEach((input) => {
                    input.value = input.defaultValue;
                });
            }

            function setRowEditing(rowId, isEditing) {
                const row = document.getElementById("holiday-row-" + rowId);
                if (!row) return;
                if (isEditing) {
                    document.querySelectorAll(".holiday-row.editing").forEach((openRow) => {
                        if (openRow !== row) {
                            resetRowInputs(openRow);
                            openRow.classList.remove("editing");
                        }
                    });
                    row.classList.add("editing");
                } else {
                    resetRowInputs(row);
                    row.classList.remove("editing");
                }
            }

            document.addEventListener("click", function (event) {
                const editButton = event.target.closest(".btn-edit-row");
                if (editButton) {
                    setRowEditing(editButton.dataset.rowId, true);
                    return;
                }

                const cancelButton = event.target.closest(".btn-cancel-row");
                if (cancelButton) {
                    setRowEditing(cancelButton.dataset.rowId, false);
                }
            });
        })();
    </script>
</body>

</html>
