<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Balance | Revature</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .year-form {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .year-form input {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            width: 120px;
            font-size: 13px;
        }

        .chip-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .chip {
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 8px 12px;
            background: #fff;
            font-size: 13px;
            font-weight: 600;
        }

        .chip strong {
            color: var(--primary);
        }

        .table-container {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-main);
            min-width: 640px;
        }

        th {
            text-align: left;
            padding: 12px 14px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            background: #f8fafc;
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(31, 60, 136, 0.02);
        }

        .leave-type {
            font-weight: 700;
            color: #1f2937;
        }

        .num {
            font-weight: 700;
        }

        .remaining-good {
            color: #047857;
        }

        .remaining-low {
            color: #b91c1c;
        }

        .empty-state {
            padding: 24px;
            border: 1px dashed var(--border);
            border-radius: 12px;
            color: var(--text-muted);
            text-align: center;
            font-weight: 600;
            background: #fff;
        }
    </style>
</head>

<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar"
            th:replace="${user.role == 'MANAGER'} ? ~{manager_dashboard :: sidebar} : ~{employee_dashboard :: sidebar}">
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="user-info">
                    <a class="notif-bell-wrap" th:href="@{/notifications}" title="Notifications">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                        </svg>
                        <span class="notif-badge" th:attr="data-count=${unreadCount}"
                            th:text="${unreadCount > 0 ? unreadCount : ''}"
                            th:if="${unreadCount != null and unreadCount > 0}"></span>
                    </a>
                    <span th:text="${user.name}">Employee Name</span>
                    <div class="avatar" th:text="${user.name.substring(0,1)}">E</div>
                </div>
            </header>

            <div class="page-header">
                <h1 class="page-title">Leave Balance By Type</h1>
                <p class="page-subtitle">Track total, used, and remaining leave by leave type.</p>
            </div>


            <div class="card">
                <div class="toolbar">
                    <div>
                        <h2 class="page-title" style="font-size: 20px;">Yearly Leave Summary</h2>
                        <p class="page-subtitle">Year: <strong th:text="${selectedYear}">2026</strong></p>
                    </div>
                    <form class="year-form" method="get" th:action="@{/employee/leave/balance}">
                        <input type="number" name="year" min="2000" max="2100" th:value="${selectedYear}" required>
                        <button type="submit" class="btn btn-primary">Load</button>
                    </form>
                </div>

                <div class="chip-list">
                    <span class="chip">Total Leaves: <strong th:text="${totalLeaves}">0</strong></span>
                    <span class="chip">Used Leaves: <strong th:text="${usedLeaves}">0</strong></span>
                    <span class="chip">Remaining Leaves: <strong th:text="${remainingLeaves}">0</strong></span>
                </div>

                <div th:if="${#lists.isEmpty(leaveBalances)}" class="empty-state">
                    No leave balance records available for the selected year.
                </div>

                <div class="table-container" th:if="${!#lists.isEmpty(leaveBalances)}">
                    <table>
                        <thead>
                            <tr>
                                <th>Leave Type</th>
                                <th>Total</th>
                                <th>Used</th>
                                <th>Remaining</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="row : ${leaveBalances}">
                                <td class="leave-type" th:text="${row.leaveTypeName}">Casual Leave</td>
                                <td class="num" th:text="${row.quotaDays}">0</td>
                                <td class="num" th:text="${row.usedDays}">0</td>
                                <td class="num"
                                    th:classappend="${row.balanceDays >= 0 ? ' remaining-good' : ' remaining-low'}"
                                    th:text="${row.balanceDays}">0</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
