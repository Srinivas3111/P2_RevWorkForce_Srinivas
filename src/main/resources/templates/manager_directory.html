<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Directory | Manager Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .search-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            margin-bottom: 14px;
        }

        .search-row input {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            background: #fff;
            color: var(--text-main);
        }

        .search-row input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(58, 108, 244, 0.12);
        }

        .table-container {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-main);
            min-width: 760px;
        }

        th {
            text-align: left;
            padding: 12px 14px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            background: #f8fafc;
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .emp-id {
            font-weight: 700;
            color: var(--primary);
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-active {
            background: #dcfce7;
            color: #166534;
        }

        .status-inactive {
            background: #fee2e2;
            color: #991b1b;
        }

        .empty-state {
            padding: 24px;
            border: 1px dashed var(--border);
            border-radius: 12px;
            color: var(--text-muted);
            text-align: center;
            font-weight: 600;
            background: #fff;
        }

        @media (max-width: 720px) {
            .search-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar" th:replace="~{manager_dashboard :: sidebar}">
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="user-info">
                    <span th:text="${user.name}">Manager Name</span>
                    <div class="avatar" th:text="${user.name.substring(0,1)}">M</div>
                </div>
            </header>

            <div class="page-header">
                <h1 class="page-title">Team Directory</h1>
                <p class="page-subtitle">Search direct reportees by name, employee ID, department, or designation.</p>
            </div>

            <form class="search-row" method="get" th:action="@{/manager/directory}">
                <input type="text" name="q" th:value="${searchQuery}"
                    placeholder="Try: 1001, John, Manager, Engineering">
                <button type="submit" class="btn btn-primary">Search</button>
            </form>

            <div th:if="${#lists.isEmpty(employees)}" class="empty-state">
                No team members match the search criteria.
            </div>

            <div class="table-container" th:if="${!#lists.isEmpty(employees)}">
                <table>
                    <thead>
                        <tr>
                            <th>Employee ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Designation</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="emp : ${employees}">
                            <td class="emp-id" th:text="${emp.id}">1001</td>
                            <td style="font-weight:600;" th:text="${emp.firstName}">John Doe</td>
                            <td th:text="${emp.email != null && !emp.email.isBlank() ? emp.email : 'N/A'}">
                                john@example.com</td>
                            <td
                                th:text="${emp.department != null && !emp.department.isBlank() ? emp.department : 'N/A'}">
                                Engineering</td>
                            <td
                                th:text="${emp.designation != null && !emp.designation.isBlank() ? emp.designation : 'N/A'}">
                                Developer</td>
                            <td>
                                <span th:if="${emp.active}" class="status-badge status-active">Active</span>
                                <span th:if="${!emp.active}" class="status-badge status-inactive">Inactive</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>

</html>
