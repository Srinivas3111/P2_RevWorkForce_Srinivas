# ============================================================
# TEST-ONLY datasource – uses H2 in-memory (no Oracle needed)
# This file is automatically picked up for ALL test executions.
# ============================================================

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=Oracle
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Thymeleaf – disable strict mode so @WebMvcTest templates parse fine
spring.thymeleaf.check-template-location=false

# Disable logging noise during tests
logging.level.root=WARN
logging.level.com.rev.app=INFO

# ===============================
# JWT CONFIGURATION (test)
# ===============================
jwt.secret=UmV2YXR1cmVXb3JrRm9yY2UyU2VjcmV0S2V5MjAyNiEh
jwt.expiration-ms=86400000
