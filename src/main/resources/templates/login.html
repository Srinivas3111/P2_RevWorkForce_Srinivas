<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Revature Workforce</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1f3c88;
            --primary-light: #3a6cf4;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --border: #e0e6ed;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(31, 60, 136, 0.1);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo span {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--primary);
        }

        h2 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--primary);
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(58, 108, 244, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(31, 60, 136, 0.2);
        }

        .error-container {
            background: #fff5f5;
            border: 1px solid #ff000024;
            color: #c0392b;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            font-weight: 500;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo">
            <span>REVATURE</span>
        </div>
        <h2>Workforce Portal</h2>

        <div th:if="${error}" class="error-container">
            <span th:text="${error}">Error message</span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="email">Employee ID / Email</label>
                <input type="text" id="email" name="email" required placeholder="Enter ID or Email"
                    autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••"
                    autocomplete="current-password">
                <div style="margin-top: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="show-password" style="width: auto; height: auto; cursor: pointer;">
                    <label for="show-password"
                        style="margin: 0; font-size: 13px; color: var(--text-muted); cursor: pointer; font-weight: 500;">Show
                        Password</label>
                </div>
            </div>
            <button type="submit" class="btn-login" style="margin-top: 20px;">Sign In</button>
        </form>

        <div class="footer">
            &copy; 2026 Revature. All rights reserved.
        </div>
    </div>

    <script>
        document.getElementById('show-password').addEventListener('change', function () {
            const passwordInput = document.getElementById('password');
            if (this.checked) {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        });
    </script>
</body>

</html>
