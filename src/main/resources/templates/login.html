<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Revature Workforce</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #f26925;
            --primary-hover: #d85a1e;
            --bg-gradient: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #e6edf3;
            --input-bg: #0d1117;
            --input-border: #30363d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo span {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--primary-color);
            text-shadow: 0 0 10px rgba(242, 105, 37, 0.3);
        }

        h2 {
            text-align: center;
            font-weight: 600;
            margin-bottom: 30px;
            color: #fff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #8b949e;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(242, 105, 37, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(242, 105, 37, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-container {
            background: rgba(248, 81, 73, 0.15);
            border: 1px solid rgba(248, 81, 73, 0.4);
            color: #ff7b72;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #8b949e;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo">
            <span>REVATURE</span>
        </div>
        <h2>Workforce Portal</h2>

        <div th:if="${error}" class="error-container">
            <span th:text="${error}">Error message</span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="email">Employee ID / Email</label>
                <input type="text" id="email" name="email" required placeholder="Enter ID or Email"
                    autocomplete="username">
            </div>
            <div class="form-group" style="position: relative;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••"
                    autocomplete="current-password">
                <div style="margin-top: 10px; display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="show-password" style="width: auto; height: auto; cursor: pointer;">
                    <label for="show-password" style="margin: 0; font-size: 13px; color: #8b949e; cursor: pointer;">Show
                        Password</label>
                </div>
            </div>
            <button type="submit" class="btn-login" style="margin-top: 20px;">Sign In</button>
        </form>

        <div class="footer">
            &copy; 2026 Revature. All rights reserved.
        </div>
    </div>

    <script>
        document.getElementById('show-password').addEventListener('change', function () {
            const passwordInput = document.getElementById('password');
            if (this.checked) {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        });
    </script>
</body>

</html>
