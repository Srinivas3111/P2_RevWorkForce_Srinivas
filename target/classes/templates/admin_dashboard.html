<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Revature</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .announcement-card {
            padding: 22px;
            margin-top: 10px;
        }

        .announcement-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 12px;
        }

        .announcement-title {
            font-size: 20px;
            color: var(--primary);
            font-weight: 700;
        }

        .announcement-link {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary-light);
            text-decoration: none;
        }

        .announcement-list {
            display: grid;
            gap: 10px;
        }

        .announcement-item {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            background: #fff;
        }

        .announcement-item-head {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 6px;
        }

        .announcement-item-title {
            font-weight: 700;
            color: #1f2937;
            font-size: 14px;
        }

        .announcement-item-time {
            color: var(--text-muted);
            font-size: 12px;
            white-space: nowrap;
        }

        .announcement-item-message {
            color: var(--text-main);
            font-size: 13px;
            white-space: pre-wrap;
        }

        .announcement-empty {
            padding: 12px;
            border: 1px dashed var(--border);
            border-radius: 10px;
            color: var(--text-muted);
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="dashboard-wrapper">
        <!-- Dashboard Sidebar -->
        <aside class="sidebar" th:replace="~{fragments/admin_sidebar :: adminSidebar('dashboard')}"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="user-info">
                    <a class="notif-bell-wrap" th:href="@{/notifications}" title="Notifications">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                        </svg>
                        <span class="notif-badge" th:attr="data-count=${unreadCount}"
                            th:text="${unreadCount > 0 ? unreadCount : ''}"
                            th:if="${unreadCount != null and unreadCount > 0}"></span>
                    </a>
                    <span th:text="${user.name}">Admin User</span>
                    <div class="avatar" th:text="${user.name.substring(0,1)}">A</div>
                </div>
            </header>

            <div class="page-header">
                <h1 class="page-title">Admin Overview</h1>
                <p class="page-subtitle">Welcome back, managing the Revature ecosystem.</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">TE</div>
                    <div class="stat-value" th:text="${totalEmployees}">0</div>
                    <div class="stat-label">Total Employees</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">TM</div>
                    <div class="stat-value" th:text="${managerCount}">0</div>
                    <div class="stat-label">Total Managers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">TD</div>
                    <div class="stat-value" th:text="${totalDepartments}">0</div>
                    <div class="stat-label">Total Departments</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">AC</div>
                    <div class="stat-value" th:text="${activeEmployees}">0</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">IN</div>
                    <div class="stat-value" th:text="${inactiveEmployees}">0</div>
                    <div class="stat-label">Inactive</div>
                </div>
            </div>


            <section class="card announcement-card">
                <div class="announcement-header">
                    <h2 class="announcement-title">Company Announcements</h2>
                    <a class="announcement-link" th:href="@{/admin/announcements}">Manage</a>
                </div>
                <div class="announcement-list">
                    <div th:if="${#lists.isEmpty(announcements)}" class="announcement-empty">
                        No active announcements.
                    </div>
                    <article class="announcement-item" th:each="a : ${announcements}">
                        <div class="announcement-item-head">
                            <h3 class="announcement-item-title" th:text="${a.title}">Announcement title</h3>
                            <span class="announcement-item-time"
                                th:text="${a.updatedOn != null ? #temporals.format(a.updatedOn, 'dd MMM yyyy HH:mm') : 'N/A'}">
                                28 Feb 2026 21:00
                            </span>
                        </div>
                        <p class="announcement-item-message" th:text="${a.message}">Announcement message.</p>
                    </article>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
