<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Overview | Revature</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .search-panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: center;
        }

        .search-group {
            position: relative;
        }

        .search-group svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-input {
            width: 100%;
            padding: 10px 14px 10px 40px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .search-input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(31, 60, 136, 0.1);
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .reportee-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .reportee-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .reportee-avatar {
            width: 48px;
            height: 48px;
            background: #f1f5f9;
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }

        .reportee-info h3 {
            font-size: 16px;
            font-weight: 700;
            color: #1f2937;
            margin: 0;
        }

        .reportee-info p {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 2px;
        }

        .reportee-detail {
            margin-top: 14px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .detail-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .detail-value {
            font-size: 12px;
            font-weight: 600;
            color: #374151;
        }

        .card-footer {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            gap: 10px;
        }

        .status-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            background: #ecfdf3;
            color: #047857;
        }

        .no-results {
            grid-column: 1 / -1;
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            font-weight: 600;
            background: white;
            border-radius: 12px;
            border: 1px dashed var(--border);
        }
    </style>
</head>

<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar" th:replace="~{manager_dashboard :: sidebar}"></aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="user-info">
                    <a class="notif-bell-wrap" th:href="@{/notifications}" title="Notifications">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                        </svg>
                        <span class="notif-badge" th:attr="data-count=${unreadCount}"
                            th:text="${unreadCount > 0 ? unreadCount : ''}"
                            th:if="${unreadCount != null and unreadCount > 0}"></span>
                    </a>
                    <span th:text="${user.name}">Manager Name</span>
                    <div class="avatar" th:text="${user.name.substring(0,1)}">M</div>
                </div>
            </header>

            <div class="page-header">
                <h1 class="page-title">Team Overview</h1>
                <p class="page-subtitle">Search and manage your direct reportees.</p>
            </div>

            <div class="search-panel">
                <div class="search-group">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="teamSearch" class="search-input"
                        placeholder="Search by name, ID, department or designation...">
                </div>
                <div class="btn" style="border: 1px solid var(--border); padding: 10px 16px; font-weight: 700;">
                    Team Size: <span th:text="${teamSize}">0</span>
                </div>
            </div>

            <div class="table-container"
                style="overflow-x: auto; background: white; border-radius: 12px; border: 1px solid var(--border);">
                <table style="width: 100%; border-collapse: collapse; min-width: 900px; text-align: left;">
                    <thead>
                        <tr>
                            <th
                                style="padding: 14px 20px; border-bottom: 2px solid var(--border); background: #f8fafc; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">
                                Employee</th>
                            <th
                                style="padding: 14px 20px; border-bottom: 2px solid var(--border); background: #f8fafc; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">
                                ID</th>
                            <th
                                style="padding: 14px 20px; border-bottom: 2px solid var(--border); background: #f8fafc; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">
                                Department & Role</th>
                            <th
                                style="padding: 14px 20px; border-bottom: 2px solid var(--border); background: #f8fafc; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">
                                Email</th>
                            <th
                                style="padding: 14px 20px; border-bottom: 2px solid var(--border); background: #f8fafc; color: var(--text-muted); font-size: 12px; text-transform: uppercase;">
                                Actions</th>
                        </tr>
                    </thead>
                    <tbody id="teamGrid">
                        <tr class="reportee-row" th:each="emp : ${reportees}"
                            th:data-search="|${emp.id} ${emp.firstName} ${emp.department} ${emp.designation}|"
                            style="border-bottom: 1px solid var(--border);">
                            <td style="padding: 16px 20px;">
                                <div style="display: flex; align-items: center; gap: 14px;">
                                    <div class="reportee-avatar" th:text="${emp.firstName.substring(0,1)}"
                                        style="width: 42px; height: 42px; border-radius: 50%; background: #f1f5f9; color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px;">
                                    </div>
                                    <div>
                                        <div style="font-weight: 700; color: #1f2937; font-size: 15px;"
                                            th:text="${emp.firstName}"></div>
                                        <span class="status-badge" th:text="${emp.active ? 'Active' : 'Inactive'}"
                                            th:style="${emp.active ? 'background: #dcfce7; color: #166534;' : 'background: #fee2e2; color: #991b1b;'}"
                                            style="font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; display: inline-block; margin-top: 4px;"></span>
                                    </div>
                                </div>
                            </td>
                            <td style="padding: 16px 20px; font-weight: 700; color: var(--primary);"
                                th:text="${emp.id}"></td>
                            <td style="padding: 16px 20px;">
                                <div style="font-weight: 600; color: var(--text-main); margin-bottom: 4px;"
                                    th:text="${emp.department}"></div>
                                <div style="font-size: 12px; color: var(--text-muted); font-weight: 500;"
                                    th:text="${emp.designation}"></div>
                            </td>
                            <td style="padding: 16px 20px; font-size: 13px; color: var(--text-main); white-space: nowrap;"
                                th:text="${emp.email}"></td>
                            <td style="padding: 16px 20px;">
                                <div style="display: flex; gap: 10px;">
                                    <a th:href="@{/manager/team-leave}" class="btn btn-primary"
                                        style="padding: 8px 12px; font-size: 12px; border-radius: 6px;">Leaves</a>
                                    <a th:href="@{/manager/performance-reviews}" class="btn"
                                        style="padding: 8px 12px; font-size: 12px; border-radius: 6px; border: 1px solid var(--border); background: white;">Performance</a>
                                </div>
                            </td>
                        </tr>
                        <tr id="noResults" style="display: none;">
                            <td colspan="5"
                                style="padding: 40px; text-align: center; color: var(--text-muted); font-weight: 600; font-size: 15px;">
                                No team members found matching your search.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('teamSearch').addEventListener('input', function (e) {
            const query = e.target.value.toLowerCase().trim();
            const rows = document.querySelectorAll('.reportee-row');
            let found = 0;

            rows.forEach(row => {
                const searchData = row.getAttribute('data-search').toLowerCase();
                if (searchData.includes(query)) {
                    row.style.display = 'table-row';
                    found++;
                } else {
                    row.style.display = 'none';
                }
            });

            document.getElementById('noResults').style.display = found === 0 ? 'table-row' : 'none';
        });
    </script>
</body>

</html>
