<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Announcements | Revature</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .announcement-list {
            display: grid;
            gap: 10px;
        }

        .announcement-item {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            background: #fff;
        }

        .announcement-item-head {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 6px;
        }

        .announcement-item-title {
            font-weight: 700;
            color: #1f2937;
            font-size: 14px;
        }

        .announcement-item-time {
            color: var(--text-muted);
            font-size: 12px;
            white-space: nowrap;
        }

        .announcement-item-message {
            color: var(--text-main);
            font-size: 13px;
            white-space: pre-wrap;
        }

        .empty-state {
            padding: 24px;
            border: 1px dashed var(--border);
            border-radius: 12px;
            color: var(--text-muted);
            text-align: center;
            font-weight: 600;
            background: #fff;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar"
            th:replace="${user.role == 'MANAGER'} ? ~{manager_dashboard :: sidebar} : ~{employee_dashboard :: sidebar}">
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="user-info">
                    <a class="notif-bell-wrap" th:href="@{/notifications}" title="Notifications">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                        </svg>
                        <span class="notif-badge" th:attr="data-count=${unreadCount}"
                            th:text="${unreadCount > 0 ? unreadCount : ''}"
                            th:if="${unreadCount != null and unreadCount > 0}"></span>
                    </a>
                    <span th:text="${user.name}">Employee Name</span>
                    <div class="avatar" th:text="${user.name.substring(0,1)}">E</div>
                </div>
            </header>

            <div class="page-header">
                <h1 class="page-title">Company Announcements</h1>
                <p class="page-subtitle">Official notices posted by Admin.</p>
            </div>

            <span class="chip">Active Announcements: <span th:text="${totalAnnouncements}"
                    style="margin-left: 6px; color: var(--primary);">0</span></span>

            <div th:if="${#lists.isEmpty(announcements)}" class="empty-state">
                No active announcements available.
            </div>

            <div class="announcement-list" th:if="${!#lists.isEmpty(announcements)}">
                <article class="announcement-item" th:each="a : ${announcements}">
                    <div class="announcement-item-head">
                        <h3 class="announcement-item-title" th:text="${a.title}">Announcement title</h3>
                        <span class="announcement-item-time"
                            th:text="${a.updatedOn != null ? #temporals.format(a.updatedOn, 'dd MMM yyyy HH:mm') : 'N/A'}">
                            01 Mar 2026 10:30
                        </span>
                    </div>
                    <p class="announcement-item-message" th:text="${a.message}">Announcement message.</p>
                </article>
            </div>
        </main>
    </div>
</body>

</html>
